services:
  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/password # add to .env
    ports:
      - "7474:7474"
      - "7687:7687"
    # volumes:
      # - ./neo4j/data:/data
      # - ./neo4j/conf:/conf
      # - ./neo4j/logs:/logs
      # - ./neo4j/plugins:/plugins

  backend:
    image: ghcr.io/astral-sh/uv:debian-slim
    expose:
      - 8000
    depends_on:
      neo4j:
        condition: service_started
    # volumes:
      # - ./backend:/app/backend
